# Déploiement backend API (gratuit) — à connecter au site Netlify
# https://render.com → New → Blueprint → ce repo

services:
  - type: web
    name: resellpro-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
